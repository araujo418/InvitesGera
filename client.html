<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvitesGera – Gerar Convite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --brand: #5ba189;
      --brand-dk: #3d7a63;
      --brand-lt: #e8f5f0;
      --dark: #1a1a2e;
      --grey: #6b7280;
      --light: #f3f4f6;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f0fdf8 0%, #e8f5f0 100%);
      min-height: 100vh;
      color: var(--dark);
      padding-bottom: 40px;
    }

    /* ── Header ── */
    .site-header {
      background: var(--dark);
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    .brand-logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand-logo span { color: var(--brand); }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      max-width: 480px;
      margin: 28px auto;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dk) 100%);
      color: #fff;
      padding: 28px 24px 22px;
      text-align: center;
    }

    .card-header .emoji { font-size: 36px; display: block; margin-bottom: 8px; }
    .card-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .card-header p { font-size: 14px; opacity: .85; }

    /* ── Inner sections ── */
    #tokenSection, #mainSection { padding: 24px; }

    /* ── Fields ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fafafa;
    }

    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(91,161,137,.15);
      background: #fff;
    }

    input[type="text"].err { border-color: var(--red); }
    input[type="text"].ok { border-color: var(--brand); }

    .token-input {
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
      font-size: 20px !important;
      font-weight: 700;
    }

    /* ── Hints ── */
    .hint {
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    .hint.show { display: block; }
    .hint.ok { color: var(--brand); }
    .hint.err { color: var(--red); }

    .char-counter {
      font-size: 11px;
      color: var(--grey);
      text-align: right;
      margin-top: 3px;
    }
    .char-counter.warn { color: var(--amber); font-weight: 600; }

    /* ── Alerts ── */
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .alert-err { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dk) 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(91,161,137,.35);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(91,161,137,.45);
    }

    .btn-primary:disabled {
      background: #d1d5db;
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--light);
      color: var(--dark);
      margin-top: 10px;
    }

    .btn-secondary:hover { background: #e5e7eb; }

    /* ── Event name banner ── */
    .event-name {
      background: var(--brand-lt);
      color: var(--brand-dk);
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      margin-bottom: 18px;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--grey);
      transition: all .2s;
    }

    .tab-btn.active {
      border-color: var(--brand);
      background: var(--brand-lt);
      color: var(--brand-dk);
    }

    /* ── Quota ── */
    .quota-box {
      background: var(--brand-lt);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .quota-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand-dk);
      margin-bottom: 8px;
    }

    .quota-bar {
      height: 8px;
      background: rgba(255,255,255,.7);
      border-radius: 99px;
      overflow: hidden;
    }

    .quota-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 99px;
      transition: width .5s ease;
    }

    /* ── Dup warning ── */
    .dup-warn {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }

    /* ── Progress ── */
    #progressBox {
      display: none;
      margin-bottom: 16px;
    }

    #progressMsg {
      font-size: 13px;
      color: var(--grey);
      text-align: center;
      margin-bottom: 8px;
    }

    .prog-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ── History ── */
    .loading-hist {
      text-align: center;
      color: var(--grey);
      font-size: 13px;
      padding: 20px 0;
    }

    .empty-state {
      text-align: center;
      padding: 30px 0;
      color: var(--grey);
    }

    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    .invite-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      transition: box-shadow .2s;
    }

    .invite-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    .invite-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .invite-meta {
      font-size: 12px;
      color: var(--grey);
    }

    .dl-btn {
      background: var(--brand-lt);
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s;
    }

    .dl-btn:hover { background: #c6e8da; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--grey);
      padding: 20px;
    }

    footer span { color: var(--brand); font-weight: 700; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      transform: scale(.95);
      transition: transform .2s;
    }

    .modal-overlay.show .modal { transform: scale(1); }

    .modal h3 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 16px;
    }

    .modal-info {
      background: var(--brand-lt);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      text-align: center;
    }

    .m-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--brand-dk);
    }

    .modal-actions { display: flex; flex-direction: column; gap: 0; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: #fff;
      padding: 12px 22px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      animation: toastIn .3s ease;
      white-space: nowrap;
    }

    .toast.err { background: var(--red); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @media (max-width: 520px) {
      .card { margin: 16px; }
      .card-header { padding: 20px 20px 16px; }
      #tokenSection, #mainSection { padding: 18px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="site-header">
    <div class="brand-logo">Invites<span>Gera</span></div>
  </div>

  <!-- Card principal -->
  <div class="card">
    <div class="card-header">
      <span class="emoji">🎉</span>
      <h1>Gerar Convite</h1>
      <p>Digite seu token de acesso</p>
    </div>

    <!-- Token Section -->
    <div id="tokenSection">
      <div class="field">
        <label>Token de Acesso</label>
        <input type="text" id="tokenInput" class="token-input" maxlength="8" placeholder="XXXXXXXX" autocomplete="off">
      </div>
      <div id="tokenError" class="alert alert-err" style="display:none"></div>
      <button class="btn btn-primary" id="accessBtn">Acessar →</button>
    </div>

    <!-- Main Section -->
    <div id="mainSection" style="display:none">
      <div id="eventNameBanner" class="event-name"></div>

      <div class="tab-bar">
        <button class="tab-btn active" id="tabGen">✨ Gerar</button>
        <button class="tab-btn" id="tabHist">📋 Histórico</button>
      </div>

      <!-- Generate Tab -->
      <div id="generateTab">
        <div class="quota-box">
          <div class="quota-label">
            <span>Convites Disponíveis</span>
            <span id="quotaText">–</span>
          </div>
          <div class="quota-bar"><div class="quota-fill" id="quotaFill"></div></div>
        </div>

        <div class="dup-warn" id="dupWarn">
          ⚠️ Já existe um convite com este nome.
        </div>

        <div class="field">
          <label>Nome do Convidado</label>
          <input type="text" id="guestNameInput" placeholder="Ex: Maria Silva"
            autocomplete="name" autocapitalize="words" maxlength="80">
          <div class="hint" id="nameHint"></div>
          <div class="char-counter" id="charCounter">0 / 80</div>
        </div>

        <div id="progressBox">
          <div id="progressMsg">Gerando convite...</div>
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        </div>

        <button class="btn btn-primary" id="generateBtn" disabled>
          🎉 Gerar Convite
        </button>
      </div>

      <!-- History Tab -->
      <div id="historyTab" style="display:none">
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Criado pela marca <span>Invites</span>, todos os direitos reservados 2026
  </footer>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3>✅ Confirmar Geração</h3>
      <div class="modal-info">
        <div class="m-name" id="modalGuestName"></div>
      </div>
      <p style="font-size:13px;color:var(--grey);text-align:center;margin:0 0 18px">
        O nome está correcto?
      </p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="confirmBtn">✅ Confirmar</button>
        <button class="btn btn-secondary" id="cancelBtn">✕ Cancelar</button>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
